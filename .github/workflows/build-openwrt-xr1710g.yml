name: Build OpenWrt XR1710G

on:
  schedule:
    - cron: "17 18 * * *"
  repository_dispatch:
    types:
      - openwrt-updated
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-openwrt-xr1710g.yml
      - README.md
  workflow_dispatch:
    inputs:
      openwrt_repo:
        description: OpenWrt source repository
        required: true
        default: https://github.com/YYH2913/openwrt.git
      openwrt_ref:
        description: OpenWrt branch, tag, or commit
        required: true
        default: xr1710g
      target_profile:
        description: OpenWrt device profile
        required: true
        default: econet_xr1710g-ubi
      wireless_country:
        description: First-boot wireless country code
        required: true
        default: CN
      fix_5g_channel:
        description: Force 5 GHz radio to a non-DFS channel on first boot
        required: true
        type: boolean
        default: true
      extra_config:
        description: Extra OpenWrt .config lines, one per line
        required: false
        default: ""
      create_release:
        description: Publish firmware files as a GitHub Release
        required: true
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: openwrt-xr1710g-check-${{ github.ref }}
  cancel-in-progress: false

env:
  TARGET: airoha
  SUBTARGET: an7581

jobs:
  check-upstream:
    name: Check OpenWrt source
    runs-on: ubuntu-24.04
    outputs:
      should_build: ${{ steps.decision.outputs.should_build }}
      skip_reason: ${{ steps.decision.outputs.skip_reason }}
      openwrt_repo: ${{ steps.resolve.outputs.openwrt_repo }}
      openwrt_ref: ${{ steps.resolve.outputs.openwrt_ref }}
      target_profile: ${{ steps.resolve.outputs.target_profile }}
      wireless_country: ${{ steps.resolve.outputs.wireless_country }}
      fix_5g_channel: ${{ steps.resolve.outputs.fix_5g_channel }}
      extra_config: ${{ steps.resolve.outputs.extra_config }}
      create_release: ${{ steps.resolve.outputs.create_release }}
      source_commit: ${{ steps.source.outputs.source_commit }}
      source_short: ${{ steps.source.outputs.source_short }}
      safe_ref: ${{ steps.source.outputs.safe_ref }}
      release_tag: ${{ steps.source.outputs.release_tag }}

    steps:
      - name: Resolve build inputs
        id: resolve
        env:
          INPUT_OPENWRT_REPO: ${{ inputs.openwrt_repo }}
          INPUT_OPENWRT_REF: ${{ inputs.openwrt_ref }}
          INPUT_TARGET_PROFILE: ${{ inputs.target_profile }}
          INPUT_WIRELESS_COUNTRY: ${{ inputs.wireless_country }}
          INPUT_FIX_5G_CHANNEL: ${{ inputs.fix_5g_channel }}
          INPUT_EXTRA_CONFIG: ${{ inputs.extra_config }}
          INPUT_CREATE_RELEASE: ${{ inputs.create_release }}
          PAYLOAD_OPENWRT_REPO: ${{ github.event.client_payload.openwrt_repo }}
          PAYLOAD_OPENWRT_REF: ${{ github.event.client_payload.openwrt_ref }}
          PAYLOAD_TARGET_PROFILE: ${{ github.event.client_payload.target_profile }}
          PAYLOAD_WIRELESS_COUNTRY: ${{ github.event.client_payload.wireless_country }}
          PAYLOAD_FIX_5G_CHANNEL: ${{ github.event.client_payload.fix_5g_channel }}
          PAYLOAD_EXTRA_CONFIG: ${{ github.event.client_payload.extra_config }}
          PAYLOAD_CREATE_RELEASE: ${{ github.event.client_payload.create_release }}
        run: |
          set -eu
          openwrt_repo="${INPUT_OPENWRT_REPO:-${PAYLOAD_OPENWRT_REPO:-https://github.com/YYH2913/openwrt.git}}"
          openwrt_ref="${INPUT_OPENWRT_REF:-${PAYLOAD_OPENWRT_REF:-xr1710g}}"
          target_profile="${INPUT_TARGET_PROFILE:-${PAYLOAD_TARGET_PROFILE:-econet_xr1710g-ubi}}"
          wireless_country="${INPUT_WIRELESS_COUNTRY:-${PAYLOAD_WIRELESS_COUNTRY:-CN}}"
          fix_5g_channel="${INPUT_FIX_5G_CHANNEL:-${PAYLOAD_FIX_5G_CHANNEL:-true}}"
          extra_config="${INPUT_EXTRA_CONFIG:-${PAYLOAD_EXTRA_CONFIG:-}}"
          create_release="${INPUT_CREATE_RELEASE:-${PAYLOAD_CREATE_RELEASE:-true}}"

          {
            printf 'openwrt_repo=%s\n' "${openwrt_repo}"
            printf 'openwrt_ref=%s\n' "${openwrt_ref}"
            printf 'target_profile=%s\n' "${target_profile}"
            printf 'wireless_country=%s\n' "${wireless_country}"
            printf 'fix_5g_channel=%s\n' "${fix_5g_channel}"
            printf 'create_release=%s\n' "${create_release}"
            printf 'extra_config<<__EXTRA_CONFIG__\n%s\n__EXTRA_CONFIG__\n' "${extra_config}"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve OpenWrt commit
        id: source
        env:
          OPENWRT_REPO: ${{ steps.resolve.outputs.openwrt_repo }}
          OPENWRT_REF: ${{ steps.resolve.outputs.openwrt_ref }}
        run: |
          set -eux
          mkdir -p source-probe
          git -C source-probe init
          git -C source-probe remote add origin "${OPENWRT_REPO}"
          git -C source-probe fetch --depth 1 origin "${OPENWRT_REF}"
          source_commit="$(git -C source-probe rev-parse FETCH_HEAD)"
          source_short="$(printf '%s' "${source_commit}" | cut -c1-12)"
          safe_ref="$(printf '%s' "${OPENWRT_REF}" | tr -cs 'A-Za-z0-9._-' '-' | sed 's/^-//;s/-$//')"
          if [ -z "${safe_ref}" ]; then
            safe_ref="${source_short}"
          fi
          release_tag="xr1710g-${safe_ref}-${source_short}"

          {
            printf 'source_commit=%s\n' "${source_commit}"
            printf 'source_short=%s\n' "${source_short}"
            printf 'safe_ref=%s\n' "${safe_ref}"
            printf 'release_tag=%s\n' "${release_tag}"
          } >> "$GITHUB_OUTPUT"

      - name: Decide whether to build
        id: decision
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.source.outputs.release_tag }}
        run: |
          set -eu
          should_build=true
          skip_reason=""

          if [ "${GITHUB_EVENT_NAME}" = "schedule" ] && gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            should_build=false
            skip_reason="Release ${RELEASE_TAG} already exists; upstream source has not changed."
          fi

          printf 'should_build=%s\n' "${should_build}" >> "$GITHUB_OUTPUT"
          printf 'skip_reason=%s\n' "${skip_reason}" >> "$GITHUB_OUTPUT"
          if [ "${should_build}" = "true" ]; then
            echo "Building ${RELEASE_TAG}"
          else
            echo "${skip_reason}"
          fi

  skipped:
    name: Skip unchanged upstream
    runs-on: ubuntu-24.04
    needs: check-upstream
    if: ${{ needs.check-upstream.outputs.should_build != 'true' }}
    steps:
      - name: Report skip
        run: echo "${{ needs.check-upstream.outputs.skip_reason }}"

  build:
    name: Build ${{ needs.check-upstream.outputs.target_profile }} @ ${{ needs.check-upstream.outputs.openwrt_ref }}
    runs-on: ubuntu-24.04
    needs: check-upstream
    if: ${{ needs.check-upstream.outputs.should_build == 'true' }}
    timeout-minutes: 720
    concurrency:
      group: openwrt-xr1710g-build
      cancel-in-progress: false
    env:
      SOURCE_DIR: openwrt
      OPENWRT_REPO: ${{ needs.check-upstream.outputs.openwrt_repo }}
      OPENWRT_REF: ${{ needs.check-upstream.outputs.openwrt_ref }}
      OPENWRT_SOURCE_COMMIT: ${{ needs.check-upstream.outputs.source_commit }}
      OPENWRT_SOURCE_SHORT: ${{ needs.check-upstream.outputs.source_short }}
      RELEASE_TAG: ${{ needs.check-upstream.outputs.release_tag }}
      TARGET_PROFILE: ${{ needs.check-upstream.outputs.target_profile }}
      WIRELESS_COUNTRY_CODE: ${{ needs.check-upstream.outputs.wireless_country }}
      FIX_5G_CHANNEL: ${{ needs.check-upstream.outputs.fix_5g_channel }}
      EXTRA_CONFIG: ${{ needs.check-upstream.outputs.extra_config }}
      CREATE_RELEASE: ${{ needs.check-upstream.outputs.create_release }}
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 2G

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Free runner disk space
        run: |
          set -eux
          timeout 180s sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc || true
          timeout 60s docker system prune -af || true
          df -h

      - name: Install build dependencies
        run: |
          set -eux
          sudo find /etc/apt/sources.list.d -type f \
            \( -iname '*azure*' -o -iname '*microsoft*' \) \
            -print -exec sudo sed -i 's/^[[:space:]]*deb /# disabled for OpenWrt build: deb /' {} \;
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang flex bison g++ gawk gcc-multilib \
            g++-multilib gettext git libncurses-dev libssl-dev \
            python3 python3-setuptools rsync swig unzip zlib1g-dev \
            file wget curl ccache libelf-dev device-tree-compiler \
            python3-ply python3-pyelftools qemu-utils zstd

      - name: Clone OpenWrt source on Linux
        run: |
          set -eux
          mkdir -p "${SOURCE_DIR}"
          git -C "${SOURCE_DIR}" init
          git -C "${SOURCE_DIR}" remote add origin "${OPENWRT_REPO}"
          git -C "${SOURCE_DIR}" fetch --depth 1 origin "${OPENWRT_SOURCE_COMMIT}" || \
            git -C "${SOURCE_DIR}" fetch --depth 1 origin "${OPENWRT_REF}"
          git -C "${SOURCE_DIR}" checkout --force "${OPENWRT_SOURCE_COMMIT}"
          git -C "${SOURCE_DIR}" log -1 --oneline

      - name: Restore downloads and ccache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.SOURCE_DIR }}/dl
            ${{ env.CCACHE_DIR }}
          key: xr1710g-${{ runner.os }}-${{ needs.check-upstream.outputs.safe_ref }}-${{ hashFiles('.github/workflows/build-openwrt-xr1710g.yml') }}
          restore-keys: |
            xr1710g-${{ runner.os }}-${{ needs.check-upstream.outputs.safe_ref }}-
            xr1710g-${{ runner.os }}-

      - name: Update and install feeds
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          set -eux
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Add OpenClash package
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          set -eux
          git clone --depth 1 https://github.com/vernesong/OpenClash.git package/OpenClash

      - name: Add XR1710G first-boot defaults
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          set -eux
          fix_5g_default=0
          if [ "${FIX_5G_CHANNEL}" != "false" ]; then
            fix_5g_default=1
          fi

          mkdir -p files/etc/uci-defaults
          cat > files/etc/uci-defaults/99-xr1710g-wireless-defaults <<'EOF'
          #!/bin/sh
          # Keep hostapd away from the invalid "00" regulatory domain.
          country="${WIRELESS_COUNTRY:-__WIRELESS_COUNTRY__}"
          channel_5g="${XR1710G_5G_CHANNEL:-36}"
          fix_5g="${XR1710G_FIX_5G_CHANNEL:-__FIX_5G_DEFAULT__}"

          for radio in $(uci -q show wireless | sed -n "s/^\(wireless\.[^.]*\)=wifi-device.*/\1/p"); do
            uci -q set "${radio}.country=${country}"
          done

          if [ "${fix_5g}" = "1" ]; then
            for radio in $(uci -q show wireless | sed -n "s/^\(wireless\.[^.]*\)=wifi-device.*/\1/p"); do
              band="$(uci -q get "${radio}.band" || true)"
              hwmode="$(uci -q get "${radio}.hwmode" || true)"
              htmode="$(uci -q get "${radio}.htmode" || true)"

              case "${band}:${hwmode}:${htmode}" in
                5g:*|*:11a:*|*:a:*)
                  uci -q set "${radio}.channel=${channel_5g}"
                  ;;
              esac
            done
          fi

          uci -q commit wireless
          exit 0
          EOF
          sed -i "s/__WIRELESS_COUNTRY__/${WIRELESS_COUNTRY_CODE}/g" files/etc/uci-defaults/99-xr1710g-wireless-defaults
          sed -i "s/__FIX_5G_DEFAULT__/${fix_5g_default}/g" files/etc/uci-defaults/99-xr1710g-wireless-defaults
          chmod +x files/etc/uci-defaults/99-xr1710g-wireless-defaults

      - name: Write build config
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          set -eux
          profile="${TARGET_PROFILE}"

          cat > .config <<EOF
          CONFIG_TARGET_${TARGET}=y
          CONFIG_TARGET_${TARGET}_${SUBTARGET}=y
          CONFIG_TARGET_${TARGET}_${SUBTARGET}_DEVICE_${profile}=y
          CONFIG_ALL=y
          CONFIG_ALL_KMODS=y
          CONFIG_ALL_NONSHARED=y
          CONFIG_BUILDBOT=y
          CONFIG_CCACHE=y
          CONFIG_DEVEL=y
          CONFIG_IB=y
          CONFIG_JSON_OVERVIEW_IMAGE_INFO=y
          CONFIG_KERNEL_BUILD_DOMAIN="github-actions"
          CONFIG_KERNEL_BUILD_USER="builder"
          CONFIG_SDK=y
          # CONFIG_PACKAGE_dnsmasq is not set
          CONFIG_PACKAGE_bash=y
          CONFIG_PACKAGE_ca-bundle=y
          CONFIG_PACKAGE_irqbalance=y
          CONFIG_PACKAGE_jq=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-app-openclash=y
          CONFIG_PACKAGE_luci-app-firewall=y
          CONFIG_PACKAGE_luci-app-package-manager=y
          CONFIG_PACKAGE_luci-app-ttyd=y
          CONFIG_PACKAGE_luci-app-irqbalance=y
          CONFIG_PACKAGE_luci-compat=y
          CONFIG_PACKAGE_luci-proto-ipv6=y
          CONFIG_PACKAGE_luci-proto-ppp=y
          CONFIG_PACKAGE_luci-theme-bootstrap=y
          CONFIG_PACKAGE_nano=y
          CONFIG_PACKAGE_dnsmasq-full=y
          CONFIG_PACKAGE_ttyd=y
          # CONFIG_TARGET_ROOTFS_INITRAMFS is not set
          EOF

          if [ -n "${EXTRA_CONFIG}" ]; then
            printf '%s\n' "${EXTRA_CONFIG}" >> .config
          fi

          if [ "${FIX_5G_CHANNEL}" != "false" ]; then
            cat >> .config <<'EOF'
          CONFIG_PACKAGE_wireless-regdb=y
          EOF
          fi

          grep -q "^CONFIG_TARGET_${TARGET}_${SUBTARGET}_DEVICE_${profile}=y$" .config
          make defconfig
          grep -q "^CONFIG_TARGET_${TARGET}_${SUBTARGET}_DEVICE_${profile}=y$" .config || {
            echo "Device profile was not accepted by OpenWrt Kconfig: ${profile}"
            grep "^CONFIG_TARGET_${TARGET}_${SUBTARGET}_DEVICE_" .config || true
            exit 1
          }

      - name: Download package sources
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          set -eux
          make download -j"$(nproc)"
          find dl -size -1024c -type f -print -delete

      - name: Compile firmware
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          set -o pipefail
          nproc
          make -j"$(nproc)" IGNORE_ERRORS=m || make -j1 V=s IGNORE_ERRORS=m

      - name: Collect firmware artifacts
        id: collect
        run: |
          set -eux
          outdir="artifacts/xr1710g"
          bindir="${SOURCE_DIR}/bin/targets/${TARGET}/${SUBTARGET}"
          mkdir -p "${outdir}"

          cp -a "${bindir}"/*.itb "${outdir}/" 2>/dev/null || true
          cp -a "${bindir}"/*.img "${outdir}/" 2>/dev/null || true
          cp -a "${bindir}"/*.bin "${outdir}/" 2>/dev/null || true
          cp -a "${bindir}"/profiles.json "${outdir}/" 2>/dev/null || true
          cp -a "${bindir}"/sha256sums "${outdir}/upstream-sha256sums" 2>/dev/null || true

          tar_paths=()
          [ -d "${SOURCE_DIR}/bin/packages" ] && tar_paths+=(packages)
          [ -d "${bindir}/packages" ] && tar_paths+=("targets/${TARGET}/${SUBTARGET}/packages")
          if [ "${#tar_paths[@]}" -gt 0 ]; then
            (cd "${SOURCE_DIR}/bin" && tar -I 'zstd -T0 -19' -cf "${GITHUB_WORKSPACE}/${outdir}/openwrt-xr1710g-packages.tar.zst" "${tar_paths[@]}")
          fi

          find "${outdir}" -maxdepth 1 -name '*sysupgrade.itb' -type f | grep -q . || {
            echo "No XR1710G sysupgrade.itb artifact was found in ${bindir}"
            find "${bindir}" -maxdepth 1 -type f -printf '%f\n' | sort
            exit 1
          }

          {
            echo "OpenWrt repo: ${OPENWRT_REPO}"
            echo "OpenWrt ref: ${OPENWRT_REF}"
            echo "OpenWrt commit: ${OPENWRT_SOURCE_COMMIT}"
            echo "Target: ${TARGET}/${SUBTARGET}"
            echo "Profile: ${TARGET_PROFILE}"
            echo "Wireless country default: ${WIRELESS_COUNTRY_CODE}"
            echo "5 GHz non-DFS default channel enabled: ${FIX_5G_CHANNEL}"
            echo
            echo "For XR1710G HTTP Recovery, use the *-sysupgrade.itb image."
            echo "Do not flash raw U-Boot artifacts from a system firmware build."
          } > "${outdir}/BUILDINFO.txt"

          (cd "${outdir}" && find . -maxdepth 1 -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS)
          find "${outdir}" -maxdepth 1 -type f -printf '%f\n' | sort
          echo "artifact_dir=${outdir}" >> "$GITHUB_OUTPUT"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-xr1710g-${{ github.run_number }}
          path: ${{ steps.collect.outputs.artifact_dir }}
          if-no-files-found: error
          retention-days: 14

      - name: Create GitHub Release
        if: ${{ env.CREATE_RELEASE == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eux
          tag="${RELEASE_TAG}"
          if gh release view "${tag}" >/dev/null 2>&1; then
            echo "Release ${tag} already exists; skipping duplicate release."
            exit 0
          fi
          gh release create "${tag}" artifacts/xr1710g/* \
            --title "OpenWrt XR1710G ${OPENWRT_REF} ${OPENWRT_SOURCE_SHORT}" \
            --notes-file artifacts/xr1710g/BUILDINFO.txt
